openapi: 3.1.0
info:
  title: Warehouse WMS API
  version: 0.2.0
  description: >-
    Contract foundation for a wholesale beer and soft-drink warehouse.
    Physical quantities are positive integers of cases, crates or kegs; no break-pack retail units.
servers:
  - url: http://localhost:3000
    description: Local development
tags:
  - name: Platform
  - name: Inventory Core
paths:
  /api/v1/health:
    get:
      tags: [Platform]
      operationId: getHealth
      summary: Liveness of the HTTP service
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Service is available
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/HealthResponse'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/inventory/postings:
    post:
      x-phase: 4
      tags: [Inventory Core]
      operationId: postInventoryCommand
      summary: Reserved public contract for Inventory Core posting
      description: Contract placeholder; implementation is intentionally deferred to Phase 4.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [documentType, documentId, warehouseId, lines]
              properties:
                documentType:
                  type: string
                  enum: [GOODS_RECEIPT, GOODS_ISSUE, TRANSFER, ADJUSTMENT, RETURN, RECALL]
                documentId:
                  type: string
                  format: uuid
                warehouseId:
                  type: string
                  format: uuid
                lines:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/PostingLine'
      responses:
        '202':
          description: Command accepted or replayed idempotently
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: Client-generated UUID; server generates one when omitted.
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Unique key scoped by caller and operation.
      schema:
        type: string
        minLength: 16
        maxLength: 128
  headers:
    CorrelationId:
      description: Correlation UUID used in logs, audit and errors.
      schema:
        type: string
        format: uuid
  schemas:
    ApiEnvelope:
      type: object
      required: [data, meta]
      properties:
        data: {}
        meta:
          type: object
          required: [correlationId, timestamp]
          properties:
            correlationId:
              type: string
            timestamp:
              type: string
              format: date-time
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, service, version, timestamp]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        service:
          type: string
        version:
          type: string
        timestamp:
          type: string
          format: date-time
    PostingLine:
      type: object
      additionalProperties: false
      required: [skuId, batchId, locationId, quantity]
      properties:
        skuId: { type: string, format: uuid }
        batchId: { type: string, format: uuid }
        locationId: { type: string, format: uuid }
        quantity:
          type: integer
          minimum: 1
          description: Whole cases/crates/kegs only.
    FieldError:
      type: object
      required: [code, message]
      properties:
        field: { type: string }
        code: { type: string }
        message: { type: string }
    ProblemDetails:
      type: object
      additionalProperties: false
      required: [type, title, status, detail, code, correlationId]
      properties:
        type: { type: string, format: uri-reference }
        title: { type: string }
        status: { type: integer, minimum: 400, maximum: 599 }
        detail: { type: string }
        instance: { type: string }
        code:
          type: string
          enum:
            - VALIDATION_FAILED
            - UNAUTHORIZED
            - FORBIDDEN
            - NOT_FOUND
            - STATE_CONFLICT
            - VERSION_CONFLICT
            - IDEMPOTENCY_CONFLICT
            - WHOLESALE_QUANTITY_REQUIRED
            - MINIMUM_QUANTITY_NOT_MET
            - INTERNAL_ERROR
        correlationId: { type: string, format: uuid }
        errors:
          type: array
          items: { $ref: '#/components/schemas/FieldError' }
  responses:
    ValidationError:
      description: Input or business validation failed
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Unauthorized:
      description: Authentication is missing or invalid
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Forbidden:
      description: Actor lacks permission or warehouse scope
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Conflict:
      description: State, version, ATP or idempotency conflict
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    InternalError:
      description: Unexpected server error
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
