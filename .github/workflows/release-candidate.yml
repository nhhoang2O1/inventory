name: release-candidate

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Release candidate version
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release-gates:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.5-bookworm
        env:
          POSTGRES_DB: warehouse_wms_release
          POSTGRES_USER: wms_app
          POSTGRES_PASSWORD: release_test_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wms_app -d warehouse_wms_release"
          --health-interval 5s --health-timeout 3s --health-retries 20
    env:
      DATABASE_URL: postgresql://wms_app:release_test_only@localhost:5432/warehouse_wms_release
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: npm
      - run: npm ci
      - name: Production dependency audit
        run: npm audit --omit=dev
      - name: Forward migration and idempotency
        run: |
          npm run db:migrate
          npm run db:migrate
          npm run db:migrate:status
      - run: npm run build
      - run: npm test
      - name: Operational readiness
        run: npm run phase10:gate
      - name: Build API image
        run: docker build --build-arg APP=api -f Dockerfile.node -t warehouse-wms-api:${{ github.sha }} .
      - name: Build worker image
        run: docker build --build-arg APP=worker -f Dockerfile.node -t warehouse-wms-worker:${{ github.sha }} .
      - name: Build web image
        run: docker build -f apps/web/Dockerfile -t warehouse-wms-web:${{ github.sha }} .
