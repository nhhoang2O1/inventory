name: ci

on:
  pull_request:
  push:
    branches: [main, hoang]

permissions:
  contents: read

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.5-bookworm
        env:
          POSTGRES_DB: warehouse_wms_test
          POSTGRES_USER: wms_app
          POSTGRES_PASSWORD: test_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wms_app -d warehouse_wms_test"
          --health-interval 5s --health-timeout 3s --health-retries 20
    env:
      DATABASE_URL: postgresql://wms_app:test_only@localhost:5432/warehouse_wms_test
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm run openapi:validate
      - run: npm run db:migrate
      - run: npm run build
      - run: npm test
